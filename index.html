@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg: #040910;
  --bg2: #070d1a;
  --bg3: #0a1220;
  --border: #0d1829;
  --border2: #1a2540;
  --c: #e0e8ff;
  --c2: #8090b0;
  --c3: #4a6080;
  --c4: #2a3a55;
  --cyan: #00d4ff;
  --orange: #ff6b35;
  --green: #a8ff3e;
  --purple: #9b59b6;
  --yellow: #e67e22;
  --pink: #ff6b9d;
  --blue: #4a90d9;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--bg); }

body {
  font-family: 'Space Mono', monospace;
  color: var(--c);
  display: flex;
  flex-direction: column;
  height: 100dvh;
}

/* ── SPLASH ── */
#splash {
  position: fixed; inset: 0; background: var(--bg); z-index: 1000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px;
  transition: opacity 0.5s;
}
#splash.fade { opacity: 0; pointer-events: none; }

.splash-icon {
  width: 100px; height: 100px;
  border: 2px solid var(--cyan);
  border-radius: 24px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow: 0 0 40px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.05);

// ══════════════════════════════════════════
// PERSISTENCE
// ══════════════════════════════════════════
function saveData() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({signals,examDB,topics})); } catch(e){}
}
function loadData() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    if(d) { const p=JSON.parse(d); signals=p.signals; examDB=p.examDB; topics=p.topics; return; }
  } catch(e){}
  signals=[...defaultData.signals];

let signals, examDB, topics;

// ══════════════════════════════════════════
// ML ENGINE
// ══════════════════════════════════════════
function mlRaw(t) { return signals.reduce((a,s)=>a+(t.signals[s.id]||0)*s.weight,0); }
function nbScore(t) {
  const raw=mlRaw(t);
  const all=topics.map(x=>mlRaw(x));
  const mean=all.reduce((a,v)=>a+v,0)/all.length;
  const std=Math.sqrt(all.reduce((a,v)=>a+Math.pow(v-mean,2),0)/all.length)||0.01;
  const z=(raw-mean)/std;
  return Math.min(99,Math.max(1,Math.round((raw+z*0.03)*100)));
}
function feats(t) {
  return signals.map(s=>({...s,contrib:Math.round((t.signals[s.id]||0)*s.weight*100),raw:t.signals[s.id]||0}))
    .sort((a,b)=>b.contrib-a.contrib);
}
function getSorted() {
  return [...topics].map(t=>({...t,score:nbScore(t),feats:feats(t)})).sort((a,b)=>b.score-a.score);
}
function getFiltered() {
  const s=getSorted();
  return filterPartie===0?s:s.filter(t=>t.partie===filterPartie);
}
function scoreColor(s){return s>80?'#a8ff3e':s>60?'#00d4ff':s>40?'#ff6b35':'#4a6080';}
function totalW(){return signals.reduce((a,s)=>a+s.weight,0);}

// ══════════════════════════════════════════
// SCORE RING SVG
// ══════════════════════════════════════════
function scoreRing(score, color) {
  const r=22, c=26, circ=2*Math.PI*r;
  const dash=circ*(score/100);
  return `<div class="score-ring">
    <svg width="52" height="52" viewBox="0 0 52 52">
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="#0d1829" stroke-width="3"/>
      <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
        stroke-dasharray="${dash} ${circ}" stroke-linecap="round"/>
    </svg>
    <div class="score-num" style="color:${color}">${score}</div>
  </div>`;
}

  f.forEach((t,i)=>{

          <input type="range" min="0" max="1" step="0.05" value="${v}" style="accent-color:${s.color}"

      detail=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid #0d1829">
        <div class="slabel">FEATURE IMPORTANCE</div>${fh}
        <div class="slabel" style="margin-top:10px">ADJUST LIVE</div>${sh}
        <button class="btn btn-r" style="margin-top:10px" onclick="removeTopic('${t.id}');event.stopPropagation()">✕ REMOVE</button>

      <div style="display:flex;align-items:center;gap:10px">

        <div style="flex:1;min-width:0">

function liveUpdateSignal(tid, sid, val) {
  const t=topics.find(t=>t.id===tid);

  const el=document.getElementById(`sv_${tid}_${sid}`);
  if(el)el.textContent=Math.round(val*100)+'%';
  renderPredict();
}

  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">+ Add Exam Year</div>
      <input id="ne_year" class="ifield" type="number" placeholder="Year (e.g. 2021)" min="2000" max="2035">
      <input id="ne_label" class="ifield" placeholder="Label (e.g. Concours Doctorat 2020-2021)">
      <input id="ne_conf" class="ifield" placeholder="Conference linked">
      <input id="ne_resp" class="ifield" placeholder="Responsible (e.g. Pr. Kharfi)">
      <textarea id="ne_notes" class="ifield" placeholder="Notes on exam content..."></textarea>
      <div class="slabel">COLOR</div>
      <div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
        ${COLORS.map((c,i)=>`<div class="cdot ${selectedColor===c?'sel':''}" id="ec_${i}" style="background:${c}" onclick="pickColor('${c}','ec_${i}')"></div>`).join('')}
      </div>
      <div class="slabel">LINK TOPICS TO THIS EXAM</div>
      <div style="max-height:200px;overflow-y:auto;background:#050a14;border-radius:8px;padding:0 10px;margin-bottom:12px">
        ${topicChecks}
      </div>
      <div class="g2" style="gap:8px">
        <button class="btn btn-c" onclick="submitAddExam()">✓ ADD EXAM</button>
        <button class="btn btn-x" onclick="closeModal()">CANCEL</button>
      </div>
    </div>
  </div>`;
}

function submitAddExam() {
  const year=parseInt(document.getElementById('ne_year').value);
  if(!year){toast('Enter a year');return;}
  const id='e'+year+'_'+Date.now();
  const linked=topics.filter(t=>document.getElementById('nec_'+t.id)?.checked).map(t=>t.id);
  linked.forEach(tid=>{const t=topics.find(x=>x.id===tid);if(t)t.exam=id;});
  examDB.push({
    id, year,
    label:document.getElementById('ne_label').value||'Concours Doctorat '+year,
    conference:document.getElementById('ne_conf').value||'—',
    responsible:document.getElementById('ne_resp').value||'—',
    notes:document.getElementById('ne_notes').value||'',
    color:selectedColor,
  });
  saveData(); closeModal(); renderExams(); renderTopics(); renderPredict();
  toast('Exam '+year+' added ✓');
}

function openAddSignal() {
  document.getElementById('modal-root').innerHTML=`
  <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">+ Add Signal</div>
      <input id="ns_label" class="ifield" placeholder="Signal name">
      <input id="ns_desc"  class="ifield" placeholder="Description">
      <div class="srow" style="margin-bottom:14px">
        <span style="font-size:9px;color:var(--c3);width:60px;flex-shrink:0">Weight</span>
        <input type="range" id="ns_w" min="0.01" max="0.5" step="0.01" value="0.1" style="accent-color:var(--cyan)"
          oninput="document.getElementById('ns_wv').textContent=Math.round(this.value*100)+'%'">
        <span class="sval" style="color:var(--cyan)" id="ns_wv">10%</span>
      </div>
      <div class="slabel">COLOR</div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        ${COLORS.map((c,i)=>`<div class="cdot ${selectedColor===c?'sel':''}" id="sc_${i}" style="background:${c}" onclick="pickColor('${c}','sc_${i}')"></div>`).join('')}
      </div>
      <div class="g2" style="gap:8px">
        <button class="btn btn-g" onclick="submitAddSignal()">✓ ADD</button>
        <button class="btn btn-x" onclick="closeModal()">CANCEL</button>
      </div>
    </div>
  </div>`;
}

function submitAddSignal() {
  const label=document.getElementById('ns_label').value.trim();
  if(!label){toast('Enter signal name');return;}
  const id='S_'+label.replace(/\s+/g,'_').toUpperCase().slice(0,8)+'_'+Date.now();
  signals.push({id,label,weight:parseFloat(document.getElementById('ns_w').value),color:selectedColor,desc:document.getElementById('ns_desc').value||''});
  topics.forEach(t=>{t.signals[id]=0;});
  saveData(); closeModal(); renderSignals(); toast('Signal added ✓');
}

// ══════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════
function switchTab(t, btn) {
  currentTab=t; selectedTopic=null;
  ['predict','exams','topics','signals','model'].forEach(tab=>{
    document.getElementById('tab-'+tab).classList.toggle('hidden',tab!==t);
    document.getElementById('tab-'+tab).classList.remove('fade-in');
    void document.getElementById('tab-'+tab).offsetWidth;
    if(tab===t) document.getElementById('tab-'+tab).classList.add('fade-in');
  });
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');

  const fab=document.getElementById('fab');
  fab.classList.toggle('hidden',!['exams','topics','signals'].includes(t));
  fab.textContent = t==='exams'?'📋 ＋': t==='signals'?'⊙ ＋':'＋';

  document.getElementById('scroll-area').scrollTop=0;
  render();
}

function setYear(y){ targetYear=y; renderPredict(); }
function setPartie(p){ filterPartie=p; renderPredict(); }
function toggleTopic(id){ selectedTopic=selectedTopic===id?null:id; renderPredict(); }
function toggleExam(id){ expandedExam=expandedExam===id?null:id; renderExams(); }
function setExamFilter(id){ examFilter=id; renderTopics(); }

function removeTopic(id){
  topics=topics.filter(t=>t.id!==id);
  if(selectedTopic===id)selectedTopic=null;
  saveData(); render(); toast('Removed ✓');
}
function removeExam(id){
  examDB=examDB.filter(e=>e.id!==id);
  topics.forEach(t=>{if(t.exam===id)t.exam='';});
  expandedExam=null;
  saveData(); render(); toast('Exam removed');
}

function pickColor(c, elId) {
  selectedColor=c;
  document.querySelectorAll('.cdot').forEach(d=>d.classList.remove('sel'));
  const el=document.getElementById(elId);
  if(el)el.classList.add('sel');
}

function resetData(){
  if(confirm('Reset ALL data to defaults?')){
    localStorage.removeItem(STORAGE_KEY);
    loadData(); render(); toast('Data reset ✓');
  }
}

// ══════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ══════════════════════════════════════════
// FULL RENDER
// ══════════════════════════════════════════
function render() {
  renderPredict(); renderExams(); renderTopics(); renderSignals(); renderModel();
  document.getElementById('hstats').textContent=`${topics.length}T·${signals.length}S·${examDB.length}E`;
}

// ══════════════════════════════════════════
// SPLASH & INIT
// ══════════════════════════════════════════
window.addEventListener('load', ()=>{
  render();
  setTimeout(()=>{
    document.getElementById('splash').classList.add('fade');
    setTimeout(()=>document.getElementById('splash').remove(),500);
  },1800);
});
</script>
</body>
</html>
